<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <style>
      .p { shape-rendering: crispEdges; }
    </style>
  </defs>
  <!-- Outer circle - retro compass/map ring -->
  <rect class="p" x="4" y="4" width="56" height="56" fill="#0A246A"/>
  <rect class="p" x="8" y="8" width="48" height="48" fill="#1A4CB5"/>
  <rect class="p" x="10" y="10" width="44" height="44" fill="#245EDC"/>
  <rect class="p" x="12" y="12" width="40" height="40" fill="#3A6EA5"/>
  <!-- Compass rose cross -->
  <rect class="p" x="30" y="8" width="4" height="12" fill="#E81123"/>
  <rect class="p" x="30" y="44" width="4" height="12" fill="#E81123"/>
  <rect class="p" x="8" y="30" width="12" height="4" fill="#E81123"/>
  <rect class="p" x="44" y="30" width="12" height="4" fill="#E81123"/>
  <!-- Compass cross highlights -->
  <rect class="p" x="32" y="8" width="2" height="12" fill="#F5A0A0"/>
  <rect class="p" x="44" y="32" width="12" height="2" fill="#F5A0A0"/>
  <!-- Center diamond -->
  <rect class="p" x="26" y="26" width="12" height="12" fill="#FFB900"/>
  <rect class="p" x="28" y="28" width="8" height="8" fill="#FFC933"/>
  <rect class="p" x="30" y="30" width="4" height="4" fill="#0A246A"/>
  <!-- Pixel "R" letter top-left quadrant -->
  <rect class="p" x="16" y="16" width="2" height="10" fill="#FFFFFF"/>
  <rect class="p" x="16" y="16" width="6" height="2" fill="#FFFFFF"/>
  <rect class="p" x="20" y="16" width="2" height="6" fill="#FFFFFF"/>
  <rect class="p" x="16" y="20" width="6" height="2" fill="#FFFFFF"/>
  <rect class="p" x="20" y="20" width="2" height="2" fill="#FFB900"/>
  <rect class="p" x="16" y="22" width="2" height="2" fill="#FFFFFF"/>
  <rect class="p" x="22" y="18" width="2" height="2" fill="#FFFFFF"/>
  <rect class="p" x="22" y="22" width="2" height="6" fill="#FFFFFF"/>
  <!-- Pixel "M" letter bottom-right quadrant -->
  <rect class="p" x="38" y="36" width="2" height="10" fill="#FFFFFF"/>
  <rect class="p" x="46" y="36" width="2" height="10" fill="#FFFFFF"/>
  <rect class="p" x="38" y="36" width="10" height="2" fill="#FFFFFF"/>
  <rect class="p" x="40" y="38" width="2" height="4" fill="#FFFFFF"/>
  <rect class="p" x="44" y="38" width="2" height="4" fill="#FFFFFF"/>
  <rect class="p" x="42" y="40" width="2" height="4" fill="#FFFFFF"/>
  <!-- Corner decorations -->
  <rect class="p" x="14" y="14" width="2" height="2" fill="#FFB900"/>
  <rect class="p" x="48" y="14" width="2" height="2" fill="#22C55E"/>
  <rect class="p" x="14" y="48" width="2" height="2" fill="#22C55E"/>
  <rect class="p" x="48" y="48" width="2" height="2" fill="#FFB900"/>
  <!-- Outer ring dots -->
  <rect class="p" x="6" y="30" width="2" height="2" fill="#FFFFFF" opacity="0.5"/>
  <rect class="p" x="56" y="30" width="2" height="2" fill="#FFFFFF" opacity="0.5"/>
  <rect class="p" x="30" y="6" width="2" height="2" fill="#FFFFFF" opacity="0.5"/>
  <rect class="p" x="30" y="56" width="2" height="2" fill="#FFFFFF" opacity="0.5"/>
</svg>
