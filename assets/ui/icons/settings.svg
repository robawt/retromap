<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <style>
      .p { shape-rendering: crispEdges; }
    </style>
  </defs>
  <!-- Gear teeth (outer) -->
  <rect class="p" x="10" y="4" width="4" height="2" fill="#808890"/>
  <rect class="p" x="18" y="4" width="4" height="2" fill="#808890"/>
  <rect class="p" x="10" y="26" width="4" height="2" fill="#808890"/>
  <rect class="p" x="18" y="26" width="4" height="2" fill="#808890"/>
  <rect class="p" x="4" y="10" width="2" height="4" fill="#808890"/>
  <rect class="p" x="4" y="18" width="2" height="4" fill="#808890"/>
  <rect class="p" x="26" y="10" width="2" height="4" fill="#808890"/>
  <rect class="p" x="26" y="18" width="2" height="4" fill="#808890"/>
  <!-- Gear body -->
  <rect class="p" x="8" y="8" width="16" height="16" fill="#A0A8B0"/>
  <rect class="p" x="10" y="10" width="12" height="12" fill="#B8C0C8"/>
  <!-- Inner hole -->
  <rect class="p" x="13" y="13" width="6" height="6" fill="#ECE9D8"/>
  <!-- Center dot -->
  <rect class="p" x="15" y="15" width="2" height="2" fill="#808890"/>
  <!-- Highlights on teeth -->
  <rect class="p" x="10" y="4" width="2" height="1" fill="#D0D0D0"/>
  <rect class="p" x="18" y="4" width="2" height="1" fill="#D0D0D0"/>
  <rect class="p" x="4" y="10" width="1" height="2" fill="#D0D0D0"/>
  <rect class="p" x="4" y="18" width="1" height="2" fill="#D0D0D0"/>
  <!-- Diagonal teeth -->
  <rect class="p" x="6" y="6" width="2" height="2" fill="#808890"/>
  <rect class="p" x="24" y="6" width="2" height="2" fill="#808890"/>
  <rect class="p" x="6" y="24" width="2" height="2" fill="#808890"/>
  <rect class="p" x="24" y="24" width="2" height="2" fill="#808890"/>
  <rect class="p" x="6" y="6" width="1" height="1" fill="#D0D0D0"/>
  <rect class="p" x="24" y="6" width="1" height="1" fill="#D0D0D0"/>
</svg>
