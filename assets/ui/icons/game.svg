<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <style>
      .p { shape-rendering: crispEdges; }
    </style>
  </defs>
  <!-- Game controller body (dark gray) -->
  <rect class="p" x="3" y="12" width="4" height="4" fill="#3A3A3A"/>
  <rect class="p" x="5" y="10" width="2" height="2" fill="#3A3A3A"/>
  <rect class="p" x="9" y="10" width="14" height="8" fill="#4A4A5A"/>
  <rect class="p" x="7" y="8" width="18" height="12" fill="#5A5A6A"/>
  <!-- D-pad (dark) -->
  <rect class="p" x="11" y="10" width="2" height="2" fill="#2A2A3A"/>
  <rect class="p" x="11" y="14" width="2" height="2" fill="#2A2A3A"/>
  <rect class="p" x="9" y="12" width="2" height="2" fill="#2A2A3A"/>
  <rect class="p" x="13" y="12" width="2" height="2" fill="#2A2A3A"/>
  <rect class="p" x="11" y="12" width="2" height="2" fill="#3A3A4A"/>
  <!-- Right buttons (colored) -->
  <rect class="p" x="19" y="10" width="2" height="2" fill="#DC2626"/>
  <rect class="p" x="19" y="14" width="2" height="2" fill="#22C55E"/>
  <rect class="p" x="17" y="12" width="2" height="2" fill="#2563EB"/>
  <rect class="p" x="21" y="12" width="2" height="2" fill="#F59E0B"/>
  <!-- Left grip -->
  <rect class="p" x="5" y="16" width="2" height="6" fill="#4A4A5A"/>
  <rect class="p" x="5" y="22" width="2" height="2" fill="#5A5A6A"/>
  <!-- Right grip -->
  <rect class="p" x="25" y="16" width="2" height="6" fill="#4A4A5A"/>
  <rect class="p" x="25" y="22" width="2" height="2" fill="#5A5A6A"/>
  <!-- Highlight/shine -->
  <rect class="p" x="9" y="10" width="6" height="1" fill="#FFFFFF" opacity="0.15"/>
  <!-- Controller wire at top -->
  <rect class="p" x="14" y="6" width="4" height="2" fill="#3A3A3A"/>
  <rect class="p" x="15" y="4" width="2" height="2" fill="#3A3A3A"/>
</svg>
