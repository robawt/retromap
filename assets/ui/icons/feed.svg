<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <style>
      .p { shape-rendering: crispEdges; }
    </style>
  </defs>
  <!-- Document body (yellow) -->
  <rect class="p" x="6" y="2" width="20" height="26" fill="#FFF3B0"/>
  <rect class="p" x="8" y="4" width="16" height="22" fill="#FFE066"/>
  <!-- Folded corner -->
  <rect class="p" x="22" y="2" width="4" height="4" fill="#FFF3B0"/>
  <rect class="p" x="22" y="2" width="2" height="2" fill="#CCA300"/>
  <rect class="p" x="24" y="2" width="2" height="2" fill="#FFF3B0"/>
  <rect class="p" x="24" y="4" width="2" height="2" fill="#FFE066"/>
  <!-- Text lines -->
  <rect class="p" x="10" y="10" width="12" height="2" fill="#885500"/>
  <rect class="p" x="10" y="14" width="10" height="2" fill="#885500"/>
  <rect class="p" x="10" y="18" width="8" height="2" fill="#885500"/>
  <!-- Bottom blue highlight bar -->
  <rect class="p" x="8" y="24" width="16" height="2" fill="#316AC5"/>
  <!-- Outline -->
  <rect class="p" x="6" y="2" width="20" height="1" fill="#000000" opacity="0.3"/>
  <rect class="p" x="6" y="27" width="20" height="1" fill="#000000" opacity="0.2"/>
  <rect class="p" x="6" y="2" width="1" height="26" fill="#000000" opacity="0.3"/>
  <rect class="p" x="25" y="2" width="1" height="26" fill="#000000" opacity="0.2"/>
</svg>
